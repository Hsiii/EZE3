<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EZE3 | Secure Access</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    :root {
      --primary: rgb(241, 168, 86);
      --bg: #0f172a;
      --border: #1e293b;
      --text: #ffffff;
      --text-muted: #94a3b8;
    }

    /* Reset and centering */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
    }

    .container {
      width: 320px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      margin-bottom: 40px;
    }

    h1 {
      margin: 0;
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: var(--primary);
      line-height: 1;
    }

    p.subtitle {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin: 12px 0 0;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .form-control {
      width: 100%;
    }

    .form-group {
      margin-bottom: 32px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    input {
      width: 100%;
      padding: 12px 0;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--border);
      color: var(--text);
      font-size: 1.125rem;
      font-family: inherit;
      transition: border-color 0.2s;
      box-sizing: border-box;
      border-radius: 0;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn {
      width: 100%;
      padding: 18px;
      background-color: var(--primary);
      color: #000;
      border: none;
      font-size: 0.9375rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      margin-top: 12px;
      /* Squircle-like smooth corners */
      border-radius: 20px;
      transition: background-color 0.2s, transform 0.1s;
    }

    .btn:hover {
      background-color: #fbd38d;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      background-color: var(--text-muted);
      cursor: not-allowed;
    }

    /* Message container with fixed height to prevent layout shifts */
    .message-container {
      height: 48px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 16px;
    }

    .message {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .message.show {
      opacity: 1;
    }

    .message.success {
      color: var(--primary);
    }

    .message.error {
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>EZE3</h1>
      <p class="subtitle">Secure NYCU Portal Access</p>
    </header>

    <div class="form-control">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Portal Account" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Portal Password">
      </div>
      <button id="save" class="btn">Save Locally</button>
    </div>

    <div class="message-container">
      <div id="message" class="message"></div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
