<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="pageTitle">EZE3</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 320px;
      min-height: auto;
      background-color: #0f172a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    body {
      padding: 24px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: #f1a856;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 0;
      background: transparent;
      border: none;
      border-bottom: 2px solid #1e293b;
      color: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-bottom-color: #f1a856;
    }

    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }

    #save {
      background-color: #f1a856;
      color: #0f172a;
    }

    #save:hover:not(:disabled) {
      background-color: #f5b86b;
      transform: scale(1.02);
    }

    #save:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #close {
      background-color: #1e293b;
      color: #ffffff;
    }

    #close:hover {
      background-color: #334155;
    }

    .message {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .message.success {
      background-color: rgba(34, 197, 94, 0.2);
      color: #86efac;
    }

    .message.error {
      background-color: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .message.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="logo">EZE3</div>
  
  <div class="form-group">
    <label data-i18n="labelUsername">Username</label>
    <input type="text" id="username" data-i18n-placeholder="placeholderUsername">
  </div>

  <div class="form-group">
    <label data-i18n="labelPassword">Password</label>
    <input type="password" id="password" data-i18n-placeholder="placeholderPassword">
  </div>

  <div id="message" class="message"></div>

  <div class="button-group">
    <button id="save" data-i18n="btnSave">Save</button>
    <button id="close" data-i18n="btnClose">Close</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
